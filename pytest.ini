[pytest]
# Pytest configuration for vmlx-engine

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Markers
markers =
    slow: marks tests as slow (require model loading, deselect with '-m "not slow"')
    integration: marks tests as integration tests (require running server)
    live: marks tests that load real models from disk and run Metal generation; deselect with '-m "not live"'

# Default options
addopts =
    -v
    --tb=short
    -m "not slow and not integration and not live"

# Ignore warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::UserWarning
