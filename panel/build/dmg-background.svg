<svg xmlns="http://www.w3.org/2000/svg" width="660" height="400" viewBox="0 0 660 400">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="100%" stop-color="#0a0c10"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="660" height="400" fill="url(#bg)"/>

  <!-- Subtle grid -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <line x1="0" y1="80" x2="660" y2="80"/>
    <line x1="0" y1="160" x2="660" y2="160"/>
    <line x1="0" y1="240" x2="660" y2="240"/>
    <line x1="0" y1="320" x2="660" y2="320"/>
    <line x1="132" y1="0" x2="132" y2="400"/>
    <line x1="264" y1="0" x2="264" y2="400"/>
    <line x1="396" y1="0" x2="396" y2="400"/>
    <line x1="528" y1="0" x2="528" y2="400"/>
  </g>

  <!-- Glow accent -->
  <ellipse cx="330" cy="50" rx="200" ry="80" fill="#3b82f6" opacity="0.06" filter="url(#glow)"/>

  <!-- Logo mark -->
  <g transform="translate(285, 30)">
    <rect x="0" y="0" width="90" height="90" rx="18" fill="url(#accent)" opacity="0.15"/>
    <text x="45" y="62" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="42" font-weight="800" fill="#3b82f6">
      <tspan fill="#60a5fa">v</tspan><tspan fill="#e2e8f0">MLX</tspan>
    </text>
  </g>

  <!-- Drag instruction arrow -->
  <g transform="translate(248, 220)" opacity="0.25">
    <line x1="0" y1="0" x2="140" y2="0" stroke="#94a3b8" stroke-width="2" stroke-dasharray="6,4"/>
    <polygon points="140,-6 152,0 140,6" fill="#94a3b8"/>
  </g>

  <!-- Bottom border accent -->
  <rect x="0" y="396" width="660" height="4" fill="url(#accent)" opacity="0.3"/>

  <!-- Version text -->
  <text x="330" y="380" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#475569" letter-spacing="0.5">
    vMLX 1.0 — The most complete MLX inference engine for Mac
  </text>
</svg>