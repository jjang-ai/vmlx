    post:
      operationId: "admin_deep_sleep"
      summary: "Enter deep sleep: unload model entirely. Process stays alive, port stays allocated."
      tags:
        - "Admin"
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      responses:
        "200":
          description: "Successful response"
  /admin/soft-sleep:
    post:
      operationId: "admin_soft_sleep"
      summary: "Enter soft sleep: clear all caches, reduce Metal cache limit. Model stays loaded."
      tags:
        - "Admin"
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      responses:
        "200":
          description: "Successful response"
  /admin/wake:
    post:
      operationId: "admin_wake"
      summary: "Wake from sleep: reload model. Triggered by JIT or manual wake."
      tags:
        - "Admin"
      security:
        - bearerAuth: []
        - apiKeyHeader: []
      responses:
        "200":
          description: "Successful response"
  /api/chat:
