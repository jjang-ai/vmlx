openapi: 3.1.0
info:
  title: vmlx Unified Local API
  version: 0.1.0
  description: >-
    Route inventory generated from FastAPI decorators in vmlx_engine/server.py.
servers:
  - url: http://127.0.0.1:8000
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
    apiKeyHeader:
      type: apiKey
      in: header
      name: x-api-key
paths:
